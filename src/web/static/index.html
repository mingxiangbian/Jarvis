<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cyrene</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div class="ambient ambient-pink"></div>
    <div class="ambient ambient-cyan"></div>
    <div class="prism-light"></div>

    <main class="app-shell" aria-label="Cyrene">
      <aside id="sidebar" class="sidebar glass-panel" aria-label="Workspace">
        <div class="sidebar-full">
          <div class="brand-row">
            <div class="brand">
              <div class="brand-avatar avatar-realistic" aria-hidden="true">
                <img class="brand-avatar-image" src="/static/assets/cyrene-realistic-avatar.png" alt="" decoding="async">
              </div>
              <div>
                <h1>Cyrene</h1>
              </div>
            </div>
            <button id="sidebarToggle" class="icon-button icon-only" type="button" aria-label="Collapse sidebar" aria-expanded="true" title="Collapse sidebar">
              <span aria-hidden="true">‹</span>
            </button>
          </div>

          <div class="nav-list" aria-label="Primary">
            <button id="newChatButton" class="nav-action" type="button">New chat</button>
          </div>
        </div>

        <div id="sidebarRail" class="sidebar-rail" aria-label="Collapsed workspace">
          <button id="railSidebarToggle" class="rail-button" type="button" aria-label="Expand sidebar" aria-expanded="false" title="Expand sidebar">
            <span aria-hidden="true">›</span>
          </button>
          <button id="railNewChatButton" class="rail-button" type="button" aria-label="New chat" title="New chat">
            <span aria-hidden="true">＋</span>
          </button>
        </div>
      </aside>

      <div id="leftResizeHandle" class="left-resize-handle" role="separator" aria-orientation="vertical" aria-label="Resize sidebar"></div>

      <section id="chat" class="chat-shell glass-panel" aria-label="Chat">
        <header class="chat-header">
          <div class="chat-title">
            <h2>Untitled session</h2>
            <div class="run-status-row" aria-live="polite">
              <span id="headerStatus" class="run-status-text">Ready</span>
            </div>
            <div class="run-status-line" aria-hidden="true"></div>
          </div>
          <div class="chat-actions">
            <button id="inspectorEdgeToggle" class="inspector-edge-toggle" type="button" aria-controls="inspector" aria-expanded="false" aria-label="Open inspector" title="Open inspector">
              <span aria-hidden="true">‹</span>
            </button>
          </div>
        </header>

        <section id="messages" class="messages" aria-live="polite" aria-label="Messages">
          <div class="empty-state">
            <div class="empty-orbit" aria-hidden="true"></div>
            <p class="eyebrow">Ready</p>
            <h3>Ask Cyrene to work through a local task.</h3>
            <p>Run status and tool activity will stream here as the agent responds.</p>
          </div>
        </section>

        <form id="composer" class="composer" aria-label="Send message">
          <textarea id="promptInput" name="prompt" rows="1" placeholder="Ask about this workspace or start a local agent run"></textarea>
          <button id="sendButton" class="send-button" type="submit">Send</button>
        </form>
      </section>

      <aside id="inspector" class="inspector glass-panel" aria-label="Inspector" aria-hidden="true">
        <header class="inspector-header">
          <div>
            <p class="eyebrow">Run details</p>
            <h2>Cyrene</h2>
          </div>
          <button id="inspectorClose" class="icon-button" type="button" aria-label="Close inspector">Close</button>
        </header>

        <div class="tabs" role="tablist" aria-label="Inspector views">
          <button class="tab" type="button" data-tab="context">Context</button>
          <button class="tab is-active" type="button" data-tab="tools">Tools</button>
          <button class="tab" type="button" data-tab="memory">Memory</button>
        </div>

        <section id="inspectorContent" class="inspector-content" aria-live="polite">
          <p class="muted">Tool activity will appear after a run starts.</p>
        </section>
      </aside>
    </main>

    <script type="module" src="/static/app.js"></script>
  </body>
</html>
